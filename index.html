<html lang="en">
<head>

<title>Architecture Material Library</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; min-height: 100%; }
  body {
    background: var(--paper, #f3efe7);
    color: var(--ink, #141414);
    font-family: var(--font-sans, 'Inter Tight'), system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.28s ease, color 0.28s ease;
  }
  ::selection { background: var(--accent, #b85c3a); color: #fff; }
  button { font: inherit; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }
  :root {
    /* Theme vars — overwritten by applySettingsToDOM */
    --paper: #f3efe7;
    --paper-2: #eae5d9;
    --paper-3: #ddd6c5;
    --ink: #141414;
    --ink-2: #3a3630;
    --ink-3: #6b6559;
    --ink-4: #9a9385;
    --rule: #d8d3c6;
    --rule-2: #c6bfae;
    --tint: rgba(20,20,20,0.03);
    --tint-2: rgba(20,20,20,0.06);
    --stripe: rgba(20,20,20,0.025);
    --accent: #b85c3a;
    --accent-ink: #8a4028;
    --accent-soft: rgba(184,92,58,0.1);
    --good: #6d9c7f;
    --good-ink: #4a6a54;
    --good-soft: rgba(109,156,127,0.1);
    --good-soft-bd: rgba(109,156,127,0.2);

    /* Typography — overwritten by applySettingsToDOM */
    --font-serif: 'Newsreader', Georgia, serif;
    --font-sans:  'Inter Tight', system-ui, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;

    /* Rule style */
    --rule-style: solid;
    --rule-opacity: 1;

    /* Swatch shape */
    --swatch-radius: 0;

    /* Stripes on/off — multiplier for zebra rows */
    --stripe-on: 0;

    --shadow: 0 16px 40px rgba(20,20,20,0.08);
  }

  [data-density="compact"] { --row-pad: 7px; --sec-gap: 32px; }
  [data-density="regular"] { --row-pad: 11px; --sec-gap: 52px; }
  [data-density="open"]    { --row-pad: 15px; --sec-gap: 72px; }

  /* When rule-style is 'none', hide all dividers by zeroing alpha */
  [data-rule-style="none"] { --rule: transparent; --rule-2: transparent; }

  /* Zebra stripe for tables when stripes=on */
  [data-stripes="on"] .aml-stripe:nth-child(even) {
    background: var(--stripe);
  }

  /* ── LAYOUT C: SPLIT — Library.html /* ── LAYOUT C: SPLIT ── */ block ── */
  .split { display: grid; grid-template-columns: 340px 1fr; gap: 0; border: 1px solid var(--rule); min-height: 600px; }
  .split-list { border-right: 1px solid var(--rule); overflow-y: auto; max-height: 700px; }
  .split-group-label { padding: 10px 12px 4px; font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); border-bottom: 1px solid var(--rule); font-weight: 500; position: sticky; top: 0; background: var(--paper); z-index: 1; }
  .split-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--rule); cursor: pointer; transition: background 0.1s; }
  .split-item:hover { background: var(--tint); }
  .split-item.active { background: rgba(109,156,127,0.07); border-right: 2px solid var(--good); }
  .split-item.active.p { background: rgba(184,92,58,0.05); border-right-color: var(--accent); }
  .split-thumb { width: 32px; height: 32px; border: 1px solid var(--rule); flex-shrink: 0; overflow: hidden; }
  .split-name { font-family: var(--font-serif); font-size: 13px; color: var(--ink); line-height: 1.3; }
  .split-sub { font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-4); }
  .split-cb { width: 14px; height: 14px; border: 1px solid var(--rule-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.1s; }
  .split-cb.checked { background: var(--ink); border-color: var(--ink); }
  .split-detail { padding: 24px 28px; overflow-y: auto; max-height: 700px; }
  .split-detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--ink-4); min-height: 400px; }
  .split-detail-empty p { font-family: var(--font-serif); font-style: italic; font-size: 15px; color: var(--ink-4); margin: 0; }
  .split-detail-empty .hint { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); letter-spacing: 0.1em; text-transform: uppercase; }
  .detail-swatch { width: 100%; height: 140px; margin-bottom: 18px; border: 1px solid var(--rule); overflow: hidden; }
  .detail-title { font-family: var(--font-serif); font-size: 22px; font-weight: 400; color: var(--ink); margin: 0 0 4px; }
  .detail-brand { font-family: var(--font-sans); font-size: 13px; color: var(--ink-3); margin-bottom: 16px; }
  .detail-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 14px; }
  .detail-label { font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 3px; }
  .detail-val { font-family: var(--font-sans); font-size: 12px; color: var(--ink-2); }
  .detail-val.mono { font-family: var(--font-mono); font-size: 11px; }
  .detail-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--rule); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-bottom: 14px; }
  .edit-label { font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 3px; }
  .edit-input { width: 100%; background: var(--paper); border: 1px solid var(--rule-2); padding: 5px 8px; font-family: var(--font-sans); font-size: 12px; color: var(--ink); outline: none; }
  .edit-input:focus { border-color: var(--ink-3); }
  .edit-input.mono { font-family: var(--font-mono); font-size: 11px; }

  /* ── BULK ACTION BAR — Library.html /* BULK ACTION BAR */ block ── */
  .bulk-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: var(--paper); padding: 13px 56px; display: flex; align-items: center; gap: 16px; z-index: 100; animation: barUp 0.18s ease; }
  @keyframes barUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .bulk-count { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: rgba(243,239,231,0.7); }
  .bulk-act { background: transparent; border: 1px solid rgba(243,239,231,0.25); padding: 5px 12px; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--paper); font-weight: 500; }
  .bulk-act:hover { background: rgba(243,239,231,0.08); }
  .bulk-act.danger { border-color: rgba(160,69,69,0.5); color: #e8a0a0; }
  .bulk-act.danger:hover { background: rgba(160,69,69,0.12); }
  .bulk-clear { margin-left: auto; background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(243,239,231,0.5); }
  .bulk-clear:hover { color: var(--paper); }
</style>
