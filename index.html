<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; min-height: 100%; }
  body {
    background: var(--paper, #f3efe7);
    color: var(--ink, #141414);
    font-family: var(--font-sans, 'Inter Tight'), system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.28s ease, color 0.28s ease;
  }
  ::selection { background: var(--accent, #b85c3a); color: #fff; }
  button { font: inherit; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }
  :root {
    /* Theme vars — overwritten by applySettingsToDOM */
    --paper: #f3efe7;
    --paper-2: #eae5d9;
    --ink: #141414;
    --ink-2: #3a3630;
    --ink-3: #6b6559;
    --ink-4: #9a9385;
    --rule: #d8d3c6;
    --rule-2: #c6bfae;
    --tint: rgba(20,20,20,0.03);
    --tint-2: rgba(20,20,20,0.06);
    --stripe: rgba(20,20,20,0.025);
    --accent: #b85c3a;
    --accent-ink: #8a4028;

    /* Typography — overwritten by applySettingsToDOM */
    --font-serif: 'Newsreader', Georgia, serif;
    --font-sans:  'Inter Tight', system-ui, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;

    /* Rule style */
    --rule-style: solid;
    --rule-opacity: 1;

    /* Swatch shape */
    --swatch-radius: 0;

    /* Stripes on/off — multiplier for zebra rows */
    --stripe-on: 0;

    --shadow: 0 16px 40px rgba(20,20,20,0.08);
  }

  [data-density="compact"] { --row-pad: 7px; --sec-gap: 32px; }
  [data-density="regular"] { --row-pad: 11px; --sec-gap: 52px; }
  [data-density="open"]    { --row-pad: 15px; --sec-gap: 72px; }

  /* When rule-style is 'none', hide all dividers by zeroing alpha */
  [data-rule-style="none"] { --rule: transparent; --rule-2: transparent; }

  /* Zebra stripe for tables when stripes=on */
  [data-stripes="on"] .aml-stripe:nth-child(even) {
    background: var(--stripe);
  }
</style>
