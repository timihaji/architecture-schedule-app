  .cp-backdrop { position: fixed; inset: 0; background: rgba(20,20,20,0.42); z-index: 90; display: flex; align-items: flex-start; justify-content: center; padding: 14vh 24px 24px; }
  .cp-panel { background: var(--paper); border: 1px solid var(--ink); width: 560px; max-width: 92vw; max-height: 60vh; display: flex; flex-direction: column; }
  .cp-input { border: none; border-bottom: 1px solid var(--rule); outline: none; padding: 14px 18px; font-family: var(--font-sans); font-size: 15px; color: var(--ink); background: transparent; width: 100%; box-sizing: border-box; }
  .cp-list { overflow-y: auto; flex: 1; }
  .cp-row { display: grid; grid-template-columns: 20px 1fr auto; gap: 10px; align-items: center; padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent; }
  .cp-row.active { background: var(--tint); border-left-color: var(--accent); }
  .cp-icon { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }
  .cp-label { font-family: var(--font-serif); font-size: 13.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cp-empty { padding: 30px 16px; text-align: center; }
  .cp-foot { padding: 8px 16px; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; background: var(--paper-2); }

  /* CHEATSHEET (D7) */
  .cs-grid { padding: 16px 22px 20px; display: grid; grid-template-columns: 110px 1fr; row-gap: 7px; column-gap: 16px; }
  .cs-key { background: var(--paper-2); border: 1px solid var(--rule-2); padding: 2px 6px; text-align: center; justify-self: start; }
  .cs-desc { font-family: var(--font-serif); font-size: 13px; color: var(--ink-2); line-height: 1.5; }

  /* BULK BAR DROPDOWN (D7) */
  .bulk-lib-drop { position: absolute; bottom: calc(100% + 8px); left: 0; background: var(--paper); color: var(--ink); border: 1px solid var(--ink); min-width: 200px; z-index: 2; }
  .bulk-lib-item { display: block; width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; padding: 7px 10px; font-family: var(--font-serif); font-size: 13px; color: var(--ink); }
  .bulk-lib-item:hover { background: var(--tint); }

  /* LIBRARY GALLERY LAYOUT (D7) */
  .lib-gallery { min-width: 0; }
  .lib-controls { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-bottom: 18px; }
  .lib-filter-row { display: grid; grid-template-columns: minmax(220px, 1fr) auto auto; gap: 28px; align-items: end; margin-bottom: 26px; }
  .lib-filter-group { display: flex; gap: 4px; align-items: baseline; }
  .lib-empty { padding: 60px 0; text-align: center; }
  .lib-section { margin-bottom: 36px; }
  .lib-section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .lib-section-rule { flex: 1; height: 1px; background: var(--rule); align-self: center; }
  .lib-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }
  .lib-expand-wrap { grid-column: 1 / -1; background: var(--paper); }

  /* APP CHROME (D8) */

  /* RenumberModal */
  .rn-backdrop { position: fixed; inset: 0; background: rgba(20,20,20,0.5); display: flex; align-items: center; justify-content: center; z-index: 9000; }
  .rn-card { background: var(--paper); width: 460px; box-shadow: 0 24px 56px rgba(20,20,20,0.2); display: flex; flex-direction: column; overflow: hidden; }
  .rn-head { padding: 16px 22px; background: var(--tint); border-bottom: 1px solid var(--rule); }
  .rn-head-title { font-family: var(--font-sans); font-weight: 600; font-size: 13px; }
  .rn-head-sub { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ink-3); margin-top: 3px; }
  .rn-list { padding: 14px 22px; max-height: 260px; overflow-y: auto; }
  .rn-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 12.5px; font-family: var(--font-mono); border-bottom: 1px dotted var(--rule-2); }
  .rn-row-from { color: var(--ink-3); min-width: 80px; }
  .rn-row-sep { color: var(--ink-4); }
  .rn-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 22px; border-top: 1px solid var(--rule); }
  .rn-btn { padding: 7px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--rule-2); background: transparent; font-family: var(--font-sans); }
  .rn-btn-pri { padding: 7px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--ink); background: var(--ink); color: var(--paper); font-family: var(--font-sans); }

  /* ImportSummaryBanner */
  .import-banner { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 10px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 8px 24px rgba(20,20,20,0.22); z-index: 8500; font-family: var(--font-sans); font-size: 13px; white-space: nowrap; }
  .import-banner-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: var(--paper); padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: var(--font-sans); }
  .import-banner-close { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }

  /* DupeMaterialModal */
  .dupe-modal-bg { position: fixed; inset: 0; background: rgba(20,20,20,0.55); display: flex; align-items: center; justify-content: center; z-index: 9000; }
  .dupe-modal-card { background: var(--paper); width: 440px; box-shadow: 0 28px 64px rgba(20,20,20,0.24); display: flex; flex-direction: column; overflow: hidden; }
  .dupe-modal-head { padding: 16px 22px; display: flex; align-items: center; gap: 10px; }
  .dupe-modal-icon { font-size: 16px; color: #fff; line-height: 1; }
  .dupe-modal-head-title { font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: #fff; letter-spacing: 0.02em; }
  .dupe-modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
  .dupe-modal-body-text { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--ink-2); line-height: 1.55; }
  .dupe-modal-existing { padding: 10px 14px; font-size: 13px; line-height: 1.4; background: rgba(184,92,58,0.08); }
  .dupe-modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .dupe-modal-btn { padding: 7px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--rule-2); background: transparent; font-family: var(--font-sans); }

  /* App shell */
  .app-shell { min-height: 100vh; display: flex; flex-direction: column; }

  /* CostScheduleHost version toggle row */
  .ver-toggle-row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-bottom: 10px; }

  /* VersionToggle */
  .ver-toggle { display: inline-flex; align-items: center; border: 1px solid var(--rule-2); padding: 2px; background: var(--paper-2, var(--paper)); }
  .ver-toggle-label { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); letter-spacing: 0.14em; text-transform: uppercase; padding: 0 8px 0 6px; }
  .ver-toggle-btn { border: none; cursor: pointer; padding: 4px 10px; font-family: var(--font-sans); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.12s ease; }

  /* RevisionBadge */
  .rev-badge { position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000; background: var(--paper-2, var(--paper)); border-top: 1px solid var(--rule); display: flex; align-items: center; padding: 3px 16px; font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); user-select: none; }
  .rev-badge-sha { color: var(--ink-3); text-decoration: none; font-weight: 500; margin-right: 8px; }
  .rev-badge-date { margin-left: 8px; }
  .rev-badge-msg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 480px; margin-left: 8px; }
  .rev-badge-gh { color: var(--ink-4); text-decoration: none; opacity: 0.7; }

  /* Footer */
  .app-footer { border-top: 1px solid var(--rule); padding: 18px 56px; display: flex; justify-content: space-between; color: var(--ink-4); }

  /* Theme transition */
  html.theme-switching *,
  html.theme-switching *::before,
  html.theme-switching *::after {
    transition: none !important;
  }
  html.theme-switching body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    background: var(--theme-cover-paper, var(--paper));
    opacity: 0;
  }
  html.theme-cover-in body::after {
    animation: themeCoverIn 90ms ease-in both;
  }
  html.theme-cover-out body::after {
    animation: themeCoverOut 170ms ease-out both;
  }
  @keyframes themeCoverIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes themeCoverOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    html.theme-switching body::after,
    html.theme-cover-in body::after,
    html.theme-cover-out body::after {
      animation: none;
    }
  }

  /* DuplicatePicker */
  .dup-pick-wrap { padding-top: 14px; }
  .dup-pick-empty { padding: 40px 4px; text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--ink-4); font-size: 14px; }
  .dup-pick-list { border-top: 1px solid var(--rule-2); }
  .dup-pick-row { width: 100%; text-align: left; display: flex; align-items: center; gap: 12px; padding: 10px 4px; background: transparent; border: none; border-bottom: 1px dotted var(--rule-2); cursor: pointer; }
  .dup-pick-row:hover { background: var(--tint); }
  .dup-pick-swatch { width: 32px; height: 32px; flex-shrink: 0; outline: 1px solid rgba(20,20,20,0.15); }
  .dup-pick-info { flex: 1; min-width: 0; }
  .dup-pick-name { font-family: var(--font-serif); font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dup-pick-meta { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4); letter-spacing: 0.06em; margin-top: 2px; }
  .dup-pick-use { font-family: var(--font-sans); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }

  /* SETTINGS PAGE SUPPLEMENTAL (D9) */

  /* Nav column in left rail */
  .st-nav { display: flex; flex-direction: column; }

  /* Shared text field — replaces fieldStyleBase() */
  .st-field { width: 100%; background: transparent; border: 1px solid var(--rule-2); padding: 6px 10px; font-family: var(--font-sans); font-size: 13px; color: var(--ink); outline: none; }
  .st-field-btn { background: transparent; border: 1px solid var(--rule-2); padding: 6px 14px; font-family: var(--font-sans); font-size: 13px; color: var(--ink); outline: none; cursor: pointer; }
  .st-field-btn-muted { color: var(--ink-3); }

  /* Firm section — logo picker */
  .st-logo-grid { display: grid; grid-template-columns: repeat(8, 44px); gap: 6px; max-width: 400px; }
  .st-logo-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .st-logo-img { width: 44px; height: 44px; object-fit: contain; border: 1px solid var(--rule-2); padding: 4px; }

  /* Codes section */
  .codes-preset-list { display: flex; flex-direction: column; gap: 8px; }
  .codes-preset-meta { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); margin-left: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
  .codes-preset-desc { margin-top: 10px; font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ink-3); line-height: 1.45; }
  .codes-custom-box { margin: 0 0 2px; padding: 18px 24px; background: var(--tint); border: 1px solid var(--rule); display: flex; flex-direction: column; gap: 20px; }
  .codes-custom-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }

  /* Keyboard section */
  .kbd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; row-gap: 36px; padding-top: 8px; }
  .kbd-group-label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); letter-spacing: 0.14em; text-transform: uppercase; padding-bottom: 10px; border-bottom: 1px solid var(--rule); }
  .kbd-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; }
  .kbd-action { font-family: var(--font-serif); font-size: 14px; color: var(--ink-2); }
  .kbd-key { font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border: 1px solid var(--rule-2); background: var(--tint); letter-spacing: 0.04em; color: var(--ink); }

  /* About section */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; padding-top: 8px; }
  .about-changelog { margin-top: 10px; max-height: 420px; overflow-y: auto; padding-right: 10px; }
  .about-release { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px dotted var(--rule-2); }
  .about-release-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .about-release-list { margin: 0; padding-left: 18px; }
  .about-release-item { font-family: var(--font-serif); font-size: 13.5px; color: var(--ink-2); line-height: 1.5; margin-bottom: 3px; }

  /* COST SCHEDULE TABLE (D10) */

  /* Root */
  .cst-root { border: 1px solid var(--rule); background: var(--paper); }

  /* Top bar */
  .cst-topbar { border-bottom: 1px solid var(--rule); background: var(--paper-2); }
  .cst-topbar-row { display: flex; align-items: center; gap: 14px; padding: 10px 14px; min-height: 44px; }
  .cst-search-input { flex: 1; max-width: 420px; background: transparent; border: 1px solid var(--rule); padding: 6px 10px; outline: none; font-family: var(--font-sans); font-size: 12px; color: var(--ink); }
  .cst-flex-1 { flex: 1; }
  .cst-row-count { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); }
  .cst-add-btn { background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); padding: 4px 8px; }
  .cst-shape-toggle { display: flex; border: 1px solid var(--rule-2); background: var(--paper); }
  .cst-shape-btn { border: none; cursor: pointer; padding: 5px 12px; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }

  /* Options bar */
  .cst-options-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 6px 14px 8px; border-top: 1px solid var(--rule); }
  .cst-options-label { font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); margin-right: 4px; flex-shrink: 0; }

  /* Option chip */
  .cst-opt-chip { display: inline-flex; align-items: center; border: 1px solid var(--rule-2); background: var(--paper); padding: 3px 6px; }
  .cst-opt-chip-idx { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); margin-right: 5px; flex-shrink: 0; }
  .cst-opt-chip-name { font-family: var(--font-sans); font-size: 11px; color: var(--ink-2); cursor: text; padding: 0 2px; }
  .cst-opt-chip-btn { background: none; border: none; cursor: pointer; padding: 0 2px; color: var(--ink-4); font-size: 10px; line-height: 1; }
  .cst-opt-chip-rm  { background: none; border: none; cursor: pointer; padding: 0 2px 0 4px; color: var(--ink-4); font-size: 11px; line-height: 1; }

  /* Bulk bar */
  .cst-bulk-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--rule); background: var(--paper-2); position: sticky; bottom: 0; z-index: 3; }
  .cst-bulk-count { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .cst-bulk-btn { background: transparent; border: 1px solid var(--rule-2); color: var(--ink); cursor: pointer; padding: 6px 10px; font-family: var(--font-sans); font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
  .cst-bulk-btn--danger { color: var(--accent-ink); }
  .cst-bulk-btn--muted  { border: none; color: var(--ink-3); }

  /* Dropdown menus inside top-bar / bulk-bar */
  .cst-menu { position: absolute; top: 100%; right: 0; margin-top: 4px; background: var(--paper); border: 1px solid var(--rule); min-width: 160px; z-index: 20; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
  .cst-menu-item { display: block; width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; padding: 8px 12px; font-family: var(--font-sans); font-size: 11.5px; color: var(--ink); }

  /* Filters bar */
  .cst-filters-bar { padding: 5px 14px; border-bottom: 1px solid var(--rule); background: var(--paper-2); display: flex; }
  .cst-filters-bar--active { padding: 6px 14px; align-items: center; gap: 6px; flex-wrap: wrap; min-height: 36px; }
  .cst-filter-add-btn { background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); padding: 3px 0; }
  .cst-filter-label { font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); margin-right: 2px; }
  .cst-filter-chip { display: inline-flex; align-items: center; border: 1px solid var(--rule-2); background: var(--paper); font-family: var(--font-sans); font-size: 11px; }
  .cst-filter-chip-field { padding: 3px 6px; color: var(--ink-3); }
  .cst-filter-chip-op    { padding: 3px 3px; color: var(--ink-4); font-size: 10px; }
  .cst-filter-chip-val   { padding: 3px 6px; color: var(--ink); }
  .cst-filter-chip-rm    { background: none; border: none; border-left: 1px solid var(--rule); cursor: pointer; padding: 3px 6px; color: var(--ink-4); font-size: 12px; }
  .cst-filter-adding  { display: inline-flex; align-items: center; gap: 4px; }
  .cst-filter-select  { font-family: var(--font-sans); font-size: 11px; padding: 3px 4px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink); }
  .cst-filter-input   { font-family: var(--font-sans); font-size: 11px; padding: 3px 6px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink); width: 120px; outline: none; }
  .cst-filter-submit  { background: var(--ink); color: var(--paper); border: none; cursor: pointer; padding: 3px 8px; font-family: var(--font-sans); font-size: 10px; }
  .cst-filter-cancel  { background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 11px; color: var(--ink-4); }

  /* Cheatsheet */
  .cst-cheatsheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .cst-cheatsheet { background: var(--paper); border: 1px solid var(--rule); padding: 24px 28px; max-width: 480px; width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .cst-cheatsheet-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .cst-cheatsheet-title { font-family: var(--font-serif); font-size: 16px; }
  .cst-cheatsheet-close { background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 18px; color: var(--ink-3); }
  .cst-cheatsheet-table { width: 100%; border-collapse: collapse; }
  .cst-cheatsheet-table tr { border-bottom: 1px solid var(--rule); }
  .cst-cheatsheet-key { padding: 5px 12px 5px 0; white-space: nowrap; font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }
  .cst-cheatsheet-val { padding: 5px 0; font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); }
  .cst-cheatsheet-hint { margin-top: 14px; font-family: var(--font-sans); font-size: 10px; color: var(--ink-4); letter-spacing: 0.08em; text-transform: uppercase; }

  /* Row-actions menu */
  .cst-row-menu-btn { background: none; border: 1px solid transparent; cursor: pointer; border-radius: 3px; padding: 2px 5px; line-height: 1; font-family: var(--font-sans); font-size: 14px; color: var(--ink-3); letter-spacing: 0.05em; }
  .cst-row-menu-btn:hover { border-color: var(--rule); }
  .cst-row-menu-dropdown { background: var(--paper); border: 1px solid var(--rule); min-width: 168px; z-index: 1000; box-shadow: 0 4px 18px rgba(0,0,0,0.12); }
  .cst-row-menu-item { display: block; width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; padding: 8px 12px; font-family: var(--font-sans); font-size: 11.5px; }
  .cst-row-menu-item:hover { background: var(--tint); }
  .cst-row-menu-sep { height: 1px; background: var(--rule); margin: 3px 0; }

  /* Side panel */
  .cst-side-panel { border-left: 1px solid var(--rule); background: var(--paper); overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
  .cst-side-panel-header { padding: 12px 14px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background: var(--paper); z-index: 1; gap: 8px; }
  .cst-side-panel-name { font-family: var(--font-serif); font-size: 14px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cst-side-panel-tags { margin-top: 5px; display: flex; gap: 6px; flex-wrap: wrap; }
