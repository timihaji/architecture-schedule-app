<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architecture Schedule — Mobile Prototype (Framed)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    background: #07070a;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }
  #root {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Subtle radial shimmer */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(168,81,51,0.06), transparent 70%),
      radial-gradient(ellipse 50% 50% at 30% 90%, rgba(74,122,138,0.04), transparent 60%);
    pointer-events: none;
  }
  #root { position: relative; z-index: 1; }
  .phone-shell {
    /* tag we can target the IOSDevice shadow on for shadow */
    filter: drop-shadow(0 32px 80px rgba(0,0,0,0.55)) drop-shadow(0 8px 24px rgba(0,0,0,0.35));
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #f3efe7;
  }
  .caption {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .caption strong { color: rgba(255,255,255,0.7); font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>
<div class="caption">Architecture Schedule · <strong>Mobile Prototype</strong> · live state</div>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  // Scale the 390×844 phone to fit the viewport with margin
  const [scale, setScale] = useState(1);

  useEffect(() => {
    function fit() {
      const PHONE_W = 402;
      const PHONE_H = 874;
      const margin = 80; // vertical breathing room around device
      const sW = (window.innerWidth - 40) / PHONE_W;
      const sH = (window.innerHeight - margin) / PHONE_H;
      setScale(Math.min(sW, sH, 1.1));
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div style={{
      transform: `scale(${scale})`,
      transformOrigin: 'center center',
      transition: 'transform 0.2s ease',
    }}>
      <div className="phone-shell">
        <IOSDevice width={402} height={874}>
          <iframe
            src="Mobile Prototype.html"
            title="Architecture Schedule mobile prototype"
            allow="clipboard-write"
          />
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
