<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Architecture Schedule — Mobile Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: var(--paper, #f3efe7);
    color: var(--ink, #141414);
    font-family: 'Inter Tight', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
  }
  input, select, textarea, button { font: inherit; color: inherit; }
  ::selection { background: var(--accent, #a85133); color: #fff; }
  button { -webkit-tap-highlight-color: transparent; }

  /* ── Design tokens ── */
  :root {
    --paper:   #f3efe7; --paper-2: #eae5d9; --paper-3: #ddd6c5;
    --ink:     #141414; --ink-2:   #3a3630; --ink-3:   #6b6559; --ink-4: #716a5b;
    --rule:    #d8d3c6; --rule-2:  #c6bfae;
    --tint:    rgba(20,20,20,0.03); --tint-2: rgba(20,20,20,0.06);
    --accent:  #a85133; --accent-soft: rgba(168,81,51,0.1);
    --font-serif: 'Newsreader', Georgia, serif;
    --font-sans:  'Inter Tight', system-ui, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;
    --row-pad: 11px;
  }

  /* ── Animations ── */
  @keyframes slideUp  { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastIn  { from { transform: translateY(120%) translateX(-50%); opacity:0; } to { transform: translateY(0) translateX(-50%); opacity:1; } }
  @keyframes toastOut { to   { transform: translateY(120%) translateX(-50%); opacity:0; } }
  @keyframes pulseDot { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
  @keyframes underlineSlide { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* ── Subtle button press feedback ── */
  button { transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease, transform 0.08s ease; }
  button:active:not(:disabled) { transform: scale(0.97); }

  /* ── Multi-line clamp helper ── */
  .clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-clamp: 2;
  }

  /* ── Edit-mode subtle accent ribbon ── */
  .editing-ribbon {
    position: relative;
  }
  .editing-ribbon::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 200% 100%;
    animation: ribbonShimmer 3.6s ease-in-out infinite;
    z-index: 51;
    pointer-events: none;
  }
  @keyframes ribbonShimmer {
    0%,100% { background-position: 100% 0; }
    50%     { background-position: 0 0; }
  }

  /* ── Scrollbar: thin ── */
  * { scrollbar-width: thin; scrollbar-color: var(--rule-2) transparent; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 2px; }

  /* ── Focus visible ── */
  :focus-visible { outline: 1px solid var(--ink); outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/proto-state.jsx"></script>
<script type="text/babel" src="src/proto-primitives.jsx"></script>
<script type="text/babel" src="src/proto-library.jsx"></script>
<script type="text/babel" src="src/proto-pages.jsx"></script>
<script type="text/babel" src="src/proto-app.jsx"></script>
</body>
</html>
