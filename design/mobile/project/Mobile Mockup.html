<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Mockup — Architecture Schedule App</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #1a1814; font-family: 'Inter Tight', system-ui, sans-serif; }
body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
#root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

/* ── Design tokens ── */
:root {
  --paper: #f3efe7; --paper-2: #eae5d9; --paper-3: #ddd6c5;
  --ink: #141414; --ink-2: #3a3630; --ink-3: #6b6559; --ink-4: #716a5b;
  --rule: #d8d3c6; --rule-2: #c6bfae;
  --tint: rgba(20,20,20,0.03); --tint-2: rgba(20,20,20,0.06);
  --accent: #a85133; --accent-ink: #8a4028; --accent-soft: rgba(168,81,51,0.1);
  --good: #6d9c7f; --good-ink: #4a6a54;
  --font-serif: 'Newsreader', Georgia, serif;
  --font-sans: 'Inter Tight', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── Seed data ── */
const MATERIALS = [
  { id:'m1', name:'Calacatta Oro', category:'stone', code:'ST-01', supplier:'Artedomus', swatch:'#e8e0d2', kind:'marble', price:'$485/m²', lead:'8–10 wk' },
  { id:'m2', name:'Blackbutt Select', category:'timber', code:'TM-02', supplier:'Big River Group', swatch:'#c9a87c', kind:'hardwood', price:'$180/m²', lead:'4–6 wk' },
  { id:'m3', name:'Dulux White on White', category:'paint', code:'PT-01', supplier:'Dulux', swatch:'#f0ede6', kind:'interior', price:'$68/can', lead:'1–2 wk' },
  { id:'m4', name:'Terrazzo Grigio', category:'stone', code:'ST-02', supplier:'Signorino', swatch:'#b8b4a8', kind:'terrazzo', price:'$320/m²', lead:'12 wk' },
  { id:'m5', name:'Dark Anodised Aluminium', category:'metal', code:'MT-01', supplier:'Capral', swatch:'#3a3a3a', kind:'profile', price:'$142/lm', lead:'6–8 wk' },
  { id:'m6', name:'Honed Basalt', category:'stone', code:'ST-03', supplier:'Eco Outdoor', swatch:'#6e6b65', kind:'basalt', price:'$290/m²', lead:'10–12 wk' },
  { id:'m7', name:'Aged Oak Veneer', category:'timber', code:'TM-03', supplier:'Laminex', swatch:'#b89060', kind:'veneer', price:'$95/m²', lead:'3–4 wk' },
  { id:'m8', name:'Pearl Ceramic 600×600', category:'ceramic', code:'CR-01', supplier:'Beaumont', swatch:'#ddd9d0', kind:'floor', price:'$110/m²', lead:'2–3 wk' },
];

const PROJECTS = [
  { id:'p1', code:'HAA-24-01', name:'Northcote House', client:'Mr & Mrs Petrov', stage:'Documentation', budget:'$980,000', address:'Northcote VIC' },
  { id:'p2', code:'HAA-24-02', name:'South Yarra Apartment', client:'Fletcher Group', stage:'Construction', budget:'$2,400,000', address:'South Yarra VIC' },
  { id:'p3', code:'HAA-23-05', name:'Fitzroy Office Fitout', client:'Comma Studio', stage:'Handover', budget:'$540,000', address:'Fitzroy VIC' },
];

const SCHEDULE_ROWS = [
  { id:'r1', code:'FS-01', element:'Living room floor', material:'Blackbutt Select', qty: 48, unit:'m²', cost: 8640 },
  { id:'r2', code:'FS-02', element:'Kitchen splashback', material:'Calacatta Oro', qty: 6.4, unit:'m²', cost: 3104 },
  { id:'r3', code:'FS-03', element:'Master bath floor', material:'Honed Basalt', qty: 12, unit:'m²', cost: 3480 },
  { id:'r4', code:'WL-01', element:'Feature wall paint', material:'Dulux White on White', qty: 3, unit:'can', cost: 204 },
  { id:'r5', code:'MT-01', element:'Window frames', material:'Dark Anodised Aluminium', qty: 22, unit:'lm', cost: 3124 },
  { id:'r6', code:'FS-04', element:'Entry terrazzo', material:'Terrazzo Grigio', qty: 8, unit:'m²', cost: 2560 },
];

/* ── Swatch box ── */
function Swatch({ color, size = 32 }) {
  return <div style={{ width: size, height: size, background: color, flexShrink: 0, outline: '1px solid rgba(20,20,20,0.12)' }} />;
}

/* ── Bottom nav ── */
function BottomNav({ view, setView }) {
  const tabs = [
    { key:'library', label:'Library', path:'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' },
    { key:'projects', label:'Projects', path:'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' },
    { key:'cost', label:'Cost', path:'M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z' },
    { key:'schedule', label:'Schedule', path:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' },
    { key:'settings', label:'Settings', path:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
  ];
  return (
    <nav style={{ position:'absolute', bottom:0, left:0, right:0, height:56, background:'var(--paper)', borderTop:'1px solid var(--ink)', display:'flex', zIndex:200 }}>
      {tabs.map(t => (
        <button key={t.key} onClick={() => setView(t.key)} style={{
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          gap:3, background:'none', border:'none', cursor:'pointer',
          color: view===t.key ? 'var(--ink)' : 'var(--ink-4)',
          fontFamily:'var(--font-sans)', fontSize:8, letterSpacing:'0.07em', textTransform:'uppercase', fontWeight:500,
          padding:'7px 0 5px', position:'relative',
          WebkitTapHighlightColor:'transparent',
        }}>
          {view===t.key && <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:28, height:2, background:'var(--ink)' }} />}
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round">
            <path d={t.path} />
          </svg>
          <span>{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ── Top Nav ── */
function TopNav({ title, onBack }) {
  return (
    <header style={{ borderBottom:'1px solid var(--ink)', padding:'10px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--paper)', position:'sticky', top:0, zIndex:50, gap:8 }}>
      {onBack ? (
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--ink-3)', fontFamily:'var(--font-sans)', fontSize:12, display:'flex', alignItems:'center', gap:4, padding:'4px 0' }}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8}><path d="M15 18l-6-6 6-6"/></svg>
          Back
        </button>
      ) : (
        <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
          <div style={{ width:20, height:20, background:'var(--ink)', flexShrink:0 }} />
          <span style={{ fontFamily:'var(--font-serif)', fontWeight:400, fontSize:15, letterSpacing:'-0.005em' }}>Hollis &amp; Arne</span>
        </div>
      )}
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <button style={{ width:36, height:36, border:'1px solid var(--rule-2)', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-3)' }}>
          <svg width={14} height={14} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth={1.35} strokeLinecap="round"><circle cx={8} cy={8} r={2.7}/><path d="M8 1.4v1.5M8 13.1v1.5M1.4 8h1.5M13.1 8h1.5M3.34 3.34l1.06 1.06M11.6 11.6l1.06 1.06M3.34 12.66l1.06-1.06M11.6 4.4l1.06-1.06"/></svg>
        </button>
        <button style={{ width:36, height:36, border:'1px solid var(--rule-2)', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-3)' }}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.4}><path d="M10.05 2.19L13.95 2.19L13.37 5.13L15.89 6.18L17.56 3.69L20.31 6.44L17.82 8.11L18.87 10.63L21.81 10.05L21.81 13.95L18.87 13.37L17.82 15.89L20.31 17.56L17.56 20.31L15.89 17.82L13.37 18.87L13.95 21.81L10.05 21.81L10.63 18.87L8.11 17.82L6.44 20.31L3.69 17.56L6.18 15.89L5.13 13.37L2.19 13.95L2.19 10.05L5.13 10.63L6.18 8.11L3.69 6.44L6.44 3.69L8.11 6.18L10.63 5.13Z"/><circle cx={12} cy={12} r={3}/></svg>
        </button>
      </div>
    </header>
  );
}

/* ══ LIBRARY PAGE ══ */
function LibraryPage({ onOpenMaterial }) {
  const [filterOpen, setFilterOpen] = useState(false);
  const [query, setQuery] = useState('');
  const [activeFilter, setActiveFilter] = useState('All');
  const filtered = MATERIALS.filter(m =>
    (activeFilter === 'All' || m.category === activeFilter) &&
    (!query || m.name.toLowerCase().includes(query.toLowerCase()))
  );
  const filterCount = (activeFilter !== 'All' ? 1 : 0);

  return (
    <div style={{ background:'var(--paper)', height:'100%', display:'flex', flexDirection:'column' }}>
      <TopNav />
      <div style={{ padding:'8px 16px 0', borderBottom:'1px solid var(--rule)' }}>
        <div style={{ fontFamily:'var(--font-sans)', fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--ink-4)', marginBottom:6 }}>Library</div>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:8, paddingBottom:12, borderBottom:'1px solid var(--rule)' }}>
          <div>
            <div style={{ fontFamily:'var(--font-serif)', fontWeight:300, fontSize:32, letterSpacing:'-0.015em', lineHeight:1.05, color:'var(--ink)', display:'flex', alignItems:'baseline', gap:8 }}>
              All libraries
              <span style={{ fontFamily:'var(--font-sans)', fontSize:16, color:'var(--ink-4)' }}>▾</span>
            </div>
            <div style={{ display:'flex', gap:8, marginTop:5 }}>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'var(--ink-4)', letterSpacing:'0.1em', textTransform:'uppercase' }}>08 PRODUCTS</span>
              <span style={{ color:'var(--rule-2)' }}>·</span>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'var(--ink-4)', letterSpacing:'0.1em', textTransform:'uppercase' }}>06 SUPPLIERS</span>
            </div>
          </div>
          <button style={{ background:'var(--ink)', color:'var(--paper)', border:'none', padding:'8px 14px', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', fontWeight:500, flexShrink:0, whiteSpace:'nowrap' }}>
            ＋ Add Product
          </button>
        </div>
        <div style={{ display:'flex', gap:0, borderBottom:'1px solid var(--rule)', marginTop:0 }}>
          {['Products', 'Gallery', 'Table', 'Split'].map((tab, i) => (
            <button key={tab} style={{ background:'none', border:'none', borderBottom: i===0 ? '2px solid var(--ink)' : '2px solid transparent', marginBottom:-1, padding:'9px 12px', fontFamily:'var(--font-sans)', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color: i===0 ? 'var(--ink)' : 'var(--ink-4)', cursor:'pointer', fontWeight: i===0 ? 600 : 400, whiteSpace:'nowrap' }}>
              {tab}
            </button>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div style={{ padding:'8px 16px', borderBottom:'1px solid var(--rule)', display:'flex', gap:6, alignItems:'center', background:'var(--paper)' }}>
        <div style={{ flex:1, display:'flex', alignItems:'center', gap:7, border:'1px solid var(--rule-2)', padding:'5px 10px' }}>
          <svg width={12} height={12} viewBox="0 0 24 24" fill="none" style={{ color:'var(--ink-4)', flexShrink:0 }}>
            <circle cx={10.5} cy={10.5} r={6} stroke="currentColor" strokeWidth={1.6}/>
            <line x1={15} y1={15} x2={20} y2={20} stroke="currentColor" strokeWidth={1.6} strokeLinecap="round"/>
          </svg>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search…" style={{ flex:1, background:'transparent', border:'none', outline:'none', fontFamily:'var(--font-sans)', fontSize:12, color:'var(--ink)', minWidth:0 }} />
        </div>
        <button onClick={() => setFilterOpen(true)} style={{ display:'flex', alignItems:'center', gap:6, background:'transparent', border: filterCount>0 ? '1px solid var(--ink)' : '1px solid var(--rule-2)', padding:'5px 10px', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:11, color: filterCount>0 ? 'var(--ink)' : 'var(--ink-3)', flexShrink:0 }}>
          Filters
          {filterCount>0 && <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:15, height:15, background:'var(--ink)', color:'var(--paper)', fontFamily:'var(--font-mono)', fontSize:8, fontWeight:700, borderRadius:'50%' }}>{filterCount}</span>}
        </button>
      </div>

      {/* Gallery grid */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 0 60px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', borderTop:'1px solid var(--rule)', borderLeft:'1px solid var(--rule)' }}>
          {filtered.map(m => (
            <div key={m.id} onClick={() => onOpenMaterial(m)} style={{ borderRight:'1px solid var(--rule)', borderBottom:'1px solid var(--rule)', cursor:'pointer', background:'var(--paper)' }}>
              <div style={{ aspectRatio:'1.3/1', background: m.swatch, position:'relative', overflow:'hidden' }}>
                <span style={{ position:'absolute', top:6, right:6, padding:'2px 5px', background:'rgba(243,239,231,0.9)', border:'1px solid var(--rule-2)', fontFamily:'var(--font-mono)', fontSize:8, color:'var(--ink-3)', letterSpacing:'0.06em' }}>{m.category}</span>
              </div>
              <div style={{ padding:'10px 12px 10px' }}>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'var(--ink-4)', marginBottom:3, letterSpacing:'0.06em' }}>{m.code}</div>
                <div style={{ fontFamily:'var(--font-serif)', fontSize:13.5, lineHeight:1.2, color:'var(--ink)' }}>{m.name}</div>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:10, color:'var(--ink-4)', marginTop:3 }}>{m.supplier}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Filter sheet */}
      {filterOpen && (
        <div style={{ position:'absolute', inset:0, background:'rgba(20,20,20,0.42)', zIndex:300 }} onClick={() => setFilterOpen(false)}>
          <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'var(--paper)', borderTop:'1px solid var(--ink)', padding:'8px 20px 24px', display:'flex', flexDirection:'column', gap:18 }} onClick={e=>e.stopPropagation()}>
            <div style={{ width:32, height:3, background:'var(--rule-2)', borderRadius:2, margin:'4px auto 0' }} />
            {[['Filter by category', ['All','stone','timber','paint','metal','ceramic']],['Sort by', ['Name','Code','Cost','Lead time']],['Group by', ['Category','Supplier','None']]].map(([label, opts], gi) => (
              <div key={gi} style={{ display:'flex', flexDirection:'column', gap:7 }}>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--ink-4)' }}>{label}</div>
                <button style={{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', background:'transparent', border:'1px solid var(--rule-2)', padding:'10px 12px', fontFamily:'var(--font-sans)', fontSize:13, color:'var(--ink)', cursor:'pointer' }}>
                  <span>{gi===0 ? activeFilter : gi===1 ? 'Name' : 'Category'}</span>
                  <span style={{ color:'var(--ink-4)', fontSize:10 }}>▾</span>
                </button>
              </div>
            ))}
            <button onClick={() => setFilterOpen(false)} style={{ background:'var(--ink)', color:'var(--paper)', border:'none', padding:'12px 18px', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12, letterSpacing:'0.1em', textTransform:'uppercase', fontWeight:500, marginTop:4 }}>
              Done
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ MATERIAL EDITOR ══ */
function MaterialEditorPage({ material, onClose }) {
  const [tab, setTab] = useState('details');
  return (
    <div style={{ background:'var(--paper)', height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--ink)', display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:4 }}>Edit product · 3 of 8</div>
          <div style={{ fontFamily:'var(--font-serif)', fontSize:22, lineHeight:1.15, color:'var(--ink)' }}>{material.name}</div>
          <div style={{ display:'flex', gap:8, marginTop:4, alignItems:'center' }}>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:9, padding:'2px 6px', background:'var(--accent-soft)', color:'var(--accent-ink)' }}>{material.code}</span>
            <span style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'var(--ink-4)' }}>{material.category}</span>
          </div>
        </div>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:22, color:'var(--ink-4)', padding:'0 0 0 8px', lineHeight:1 }}>×</button>
      </div>
      <div style={{ display:'flex', borderBottom:'1px solid var(--rule)', padding:'0 12px', overflowX:'auto' }}>
        {['Details','Visual','Specs','Commercial','Used By'].map(t => (
          <button key={t} onClick={() => setTab(t.toLowerCase())} style={{ background:'none', border:'none', borderBottom: tab===t.toLowerCase() ? '2px solid var(--ink)' : '2px solid transparent', marginBottom:-1, padding:'9px 10px', fontFamily:'var(--font-sans)', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color: tab===t.toLowerCase() ? 'var(--ink)' : 'var(--ink-4)', cursor:'pointer', whiteSpace:'nowrap', fontWeight: tab===t.toLowerCase() ? 500 : 400 }}>
            {t}
          </button>
        ))}
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'16px 16px 80px' }}>
        {/* Swatch */}
        <div style={{ width:'100%', height:100, background: material.swatch, marginBottom:16, border:'1px solid var(--rule)' }} />
        {/* Fields */}
        {[['Name', material.name],['Code', material.code],['Category', material.category],['Supplier', material.supplier],['Unit Cost', material.price],['Lead Time', material.lead]].map(([l,v]) => (
          <div key={l} style={{ marginBottom:12 }}>
            <label style={{ display:'block', fontFamily:'var(--font-sans)', fontSize:8.5, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--ink-4)', marginBottom:4 }}>{l}</label>
            <input defaultValue={v} style={{ width:'100%', background:'var(--paper)', border:'1px solid var(--rule-2)', padding:'7px 10px', fontFamily:'var(--font-sans)', fontSize:13, color:'var(--ink)', outline:'none' }} />
          </div>
        ))}
        <div style={{ marginBottom:12 }}>
          <label style={{ display:'block', fontFamily:'var(--font-sans)', fontSize:8.5, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--ink-4)', marginBottom:4 }}>Notes</label>
          <textarea rows={3} style={{ width:'100%', background:'var(--paper)', border:'1px solid var(--rule-2)', padding:'7px 10px', fontFamily:'var(--font-serif)', fontSize:13, color:'var(--ink-2)', outline:'none', resize:'none' }} placeholder="Specification notes…" />
        </div>
      </div>
      <div style={{ padding:'12px 16px', borderTop:'1px solid var(--rule)', display:'flex', gap:8, background:'var(--paper)' }}>
        <button onClick={onClose} style={{ background:'transparent', border:'1px solid var(--rule-2)', color:'var(--ink-3)', padding:'9px 14px', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:10.5, letterSpacing:'0.1em', textTransform:'uppercase' }}>Cancel</button>

/* ══ ROOT APP ══ */
function MobileApp() {
  const [view, setView] = useState('library');
  const [openMaterial, setOpenMaterial] = useState(null);

  const screen = openMaterial ? (
    <MaterialEditorPage material={openMaterial} onClose={() => setOpenMaterial(null)} />
  ) : view === 'library' ? (
    <LibraryPage onOpenMaterial={setOpenMaterial} />
  ) : view === 'projects' ? (
    <ProjectsPage />
  ) : view === 'cost' ? (
    <CostPage />
  ) : view === 'schedule' ? (
    <SchedulePage />
  ) : (
    <SettingsPage />
  );

  return (
    <div style={{ position:'relative', height:'100%', overflow:'hidden', background:'var(--paper)' }}>
      {screen}
      {!openMaterial && <BottomNav view={view} setView={setView} />}
    </div>
  );
}

/* ══ CANVAS — 3 phones side by side ══ */
function Canvas() {
  const screens = [
    { label:'Library — Gallery', view:'library' },
    { label:'Projects — Cards', view:'projects' },
    { label:'Cost Schedule', view:'cost' },
    { label:'Settings', view:'settings' },
  ];

  return (
    <div style={{ display:'flex', gap:40, padding:'40px 48px', alignItems:'flex-start', overflow:'auto', width:'100%', height:'100%', justifyContent:'center' }}>
      {screens.map(({ label, view: v }) => (
        <div key={v} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, flexShrink:0 }}>
          <IOSDevice width={375} height={812}>
            <LockedApp view={v} />
          </IOSDevice>
          <span style={{ color:'rgba(255,255,255,0.55)', fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase' }}>{label}</span>
        </div>
      ))}
    </div>
  );
}

/* A locked (non-interactive) snapshot of each view for side-by-side display */
function LockedApp({ view }) {
  const [mat, setMat] = useState(null);
  // Library filter sheet shown for the library screen
  const [showSheet, setShowSheet] = useState(view === 'library');

  const screen = mat ? (
    <MaterialEditorPage material={mat} onClose={() => setMat(null)} />
  ) : view === 'library' ? (
    <LibraryPage onOpenMaterial={setMat} />
  ) : view === 'projects' ? (
    <ProjectsPage />
  ) : view === 'cost' ? (
    <CostPage />
  ) : (
    <SettingsPage />
  );

  return (
    <div style={{ position:'relative', height:'100%', overflow:'hidden', background:'var(--paper)' }}>
      {screen}
      {!mat && <BottomNav view={view} setView={() => {}} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Canvas />);
</script>
