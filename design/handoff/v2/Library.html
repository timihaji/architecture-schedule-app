  const [brand, setBrand] = useState(editItem?.brand || '');
  const [supplier, setSupplier] = useState(editItem?.supplier || '');
  const [type, setType] = useState(editItem?.type || (isTypeMode ? 'Wall type' : 'Tapware'));
  const [subtype, setSubtype] = useState(editItem?.subtype || '');
  const [trade, setTrade] = useState(editItem?.trade || 'Plumbing');
  const [sku, setSku] = useState(editItem?.sku || '');
  const [price, setPrice] = useState(editItem?.price || '');
  const [unit, setUnit] = useState(editItem?.unit || 'ea');
  const [color, setColor] = useState(editItem?.color || '#a08660');
  const [tags, setTags] = useState(editItem?.tags || []);

  /* Assembly-specific state */
  const buildSlotsFromType = (t) => {
    if (t?.colors && t.colors.length) {
      // Hydrate from existing TYPE record (colors[], slots count, trades)
      const tradePool = t.trades && t.trades.length ? t.trades : ['Carpentry'];
      return t.colors.map((c, i) => ({
        id: 's_' + Math.random().toString(36).slice(2,7),
        name: ['Substrate','Core','Lining','Finish','Top layer','Fixings'][i] || `Layer ${i+1}`,
        trade: tradePool[i % tradePool.length],
        color: c,
        thickness:'', qty:'', notes:'', productId: null,
      }));
    }
    return null;
  };
  const [code, setCode] = useState(editItem?.code || nextAsmCode((editItem?.template) || 'Wall type', allTypeCodes));
  const [asmName, setAsmName] = useState(editItem?.name || '');
  const [template, setTemplate] = useState(editItem?.template || 'Wall type');
  const [element, setElement] = useState(editItem?.element || (editItem?.template === 'Bathroom set' ? 'Bathroom (set)' : editItem?.template === 'Garden bed' ? 'Garden bed' : editItem?.template === 'Balustrade' ? 'Balustrade' : 'Wall'));
  const [acoustic, setAcoustic] = useState(editItem?.acoustic || '');
  const [fire, setFire] = useState(editItem?.fire || '');
  const [thickness, setThickness] = useState(editItem?.thickness || '');
  const [asmNotes, setAsmNotes] = useState(editItem?.notes || '');
  const [tagsAsm, setTagsAsm] = useState(editItem?.tags || []);

  const [slots, setSlots] = useState(() => {
    const fromExisting = buildSlotsFromType(editItem);
    if (fromExisting) return fromExisting;
    const tmpl = ASM_TEMPLATES[editItem?.template || 'Wall type'];
    return (tmpl?.defaultSlots || []).map(s => ({ ...s, id: 's_' + Math.random().toString(36).slice(2,7), thickness:'', qty:'', notes:'', productId: null }));
  });
  const [expanded, setExpanded] = useState(new Set());
  const [dragState, setDragState] = useState(null);

  // when template changes (and not edit), prefill slots & regen code
  React.useEffect(() => {
    if (!isTypeMode) return;
    if (isEdit) return;
    const tmpl = ASM_TEMPLATES[template];
    if (tmpl) {
      setSlots(tmpl.defaultSlots.map(s => ({ ...s, id: 's_' + Math.random().toString(36).slice(2,7), thickness:'', qty:'', notes:'', productId: null })));
    }
    setCode(nextAsmCode(template, allTypeCodes));
    setElement(template === 'Bathroom set' ? 'Bathroom (set)' : template === 'Garden bed' ? 'Garden bed' : template === 'Balustrade' ? 'Balustrade' : template === 'Flooring' ? 'Floor' : 'Wall');
  }, [template]);

  const updateSlot = (i, next) => setSlots(prev => prev.map((s, j) => j === i ? next : s));
  const removeSlot = (i) => setSlots(prev => prev.filter((_, j) => j !== i));
  const addSlot = () => setSlots(prev => [...prev, { id: 's_' + Math.random().toString(36).slice(2,7), name:'', trade: ALL_TRADES[0], color:'#c8b89a', thickness:'', qty:'', notes:'', productId: null }]);
  const moveTo = (from, to) => setSlots(prev => {
    const arr = [...prev]; const [s] = arr.splice(from, 1); arr.splice(to, 0, s); return arr;
  });
  const toggleExpand = (id) => setExpanded(prev => { const n = new Set(prev); if (n.has(id)) n.delete(id); else n.add(id); return n; });

  const derivedTrades = Array.from(new Set(slots.map(s => s.trade).filter(Boolean)));
  const boundCount = slots.filter(s => s.productId).length;

  // ESC to close
  React.useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const submit = () => {
    if (isTypeMode) {
      onSave({
        id: editItem?.id,
        code,
        name: asmName,
        template,
        element,
        slots: slots.length,
        trades: derivedTrades,
        colors: slots.map(s => s.color),
        slotData: slots,
        acoustic, fire, thickness,
        notes: asmNotes,
        tags: tagsAsm,
      });
    } else {
      onSave({ id: editItem?.id, code: editItem?.code, name, brand, supplier, type, subtype, trade, sku, price, unit, color, tags });
    }
    onClose();
  };

  return (
    <>
      <div className="drw-bg" onClick={onClose}></div>
      <div className="drw-panel" role="dialog" aria-label={isEdit ? (isTypeMode ? 'Edit Assembly' : 'Edit Item') : (isTypeMode ? 'Add Assembly' : 'Add Item')}>
        <div className="drw-head">
          <div className="eyebrow">I · Library / {isEdit ? 'Edit' : 'Add'}</div>
          <div className="drw-head-row">
            <span className="page-title" style={{ fontSize:22 }}>
              {isEdit && <span style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontWeight:300, color:'var(--accent-ink)', marginRight:10 }}>{editItem.code}</span>}
              {isEdit ? (isTypeMode ? 'Edit Assembly' : 'Edit Item') : (isTypeMode ? 'Add Assembly' : 'Add Item')}
            </span>
            <button className="drw-close" onClick={onClose} aria-label="Close">×</button>
          </div>
        </div>
        {!isEdit && !isTypeMode && (
          <div style={{ padding:'0 22px' }}>
            <div className="modes">
              {[{v:'manual',l:'Manual'},{v:'url',l:'Paste URL'},{v:'pdf',l:'Upload PDF'},{v:'csv',l:'Import CSV'},{v:'dupe',l:'Duplicate'}].map(m => (
                <button key={m.v} className={`mode${mode===m.v?' active':''}`} onClick={() => setMode(m.v)}>{m.l}</button>
              ))}
            </div>
          </div>
        )}
        <div className="drw-body">
          {!isEdit && !isTypeMode && <ModeIntro mode={mode} />}

          {isTypeMode ? (
            <div className="asm-grid">
              <div className="asm-main">
                <div className="section-h">Identity <span className="num">01</span></div>
                <div style={{ marginBottom:10 }}>
                  <label className="lbl-d">Name<span className="req-d">*</span></label>
                  <input className="inp-d" placeholder="e.g. Internal acoustic partition" value={asmName} onChange={e => setAsmName(e.target.value)} autoFocus />
                </div>
                <div className="row-2">
                  <div>
                    <label className="lbl-d">Template</label>
                    <select className="sel-d" value={template} onChange={e => setTemplate(e.target.value)}>
                      {Object.keys(ASM_TEMPLATES).map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="lbl-d">Element</label>
                    <select className="sel-d" value={element} onChange={e => setElement(e.target.value)}>
                      {['Wall','Floor','Ceiling','Door','Window','Bathroom (set)','Balustrade','Garden bed','Tapware','Mechanical'].map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                </div>

                <div className="section-h">Performance <span className="num">02</span></div>
                <div className="props-grid">
                  <div>
                    <label className="lbl-d">Acoustic (Rw)</label>
                    <input className="inp-d mono" placeholder="e.g. Rw 50" value={acoustic} onChange={e => setAcoustic(e.target.value)} />
                  </div>
                  <div>
                    <label className="lbl-d">Fire (FRL)</label>
                    <input className="inp-d mono" placeholder="e.g. 60/60/60" value={fire} onChange={e => setFire(e.target.value)} />
                  </div>
                  <div>
                    <label className="lbl-d">Total thickness</label>
                    <input className="inp-d mono" placeholder="e.g. 130 mm" value={thickness} onChange={e => setThickness(e.target.value)} />
                  </div>
                </div>

                <div className="section-h">
                  Layers / Slots <span className="num">03</span>
                  <span style={{ flex:1 }}></span>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.12em', color:'var(--ink-4)' }}>{slots.length} slot{slots.length===1?'':'s'} · {boundCount} bound</span>
                </div>
                <div style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:12, color:'var(--ink-3)', marginBottom:8 }}>
                  Layers stack from substrate (top) to finish (bottom). Drag the handle to reorder. Click <span style={{ fontFamily:'var(--font-mono)', fontStyle:'normal' }}>▶</span> to bind a Library item or add slot notes.
                </div>

                <div className="slot-table">
                  <div className="slot-thead">
                    <span></span>
                    <span className="h">№</span>
                    <span className="h">Layer</span>
                    <span className="h">Trade</span>
                    <span></span>
                    <span></span>
                  </div>
                  {slots.length === 0 && (
                    <div style={{ padding:'18px 14px', textAlign:'center', fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:12, color:'var(--ink-4)' }}>
                      No layers yet. Add a slot to begin building this assembly.
                    </div>
                  )}
                  {slots.map((s, i) => (
                    <SlotRow
                      key={s.id}
                      slot={s} idx={i} total={slots.length}
                      products={allProducts}
                      onChange={(next) => updateSlot(i, next)}
                      onRemove={() => removeSlot(i)}
                      onMoveTo={moveTo}
                      dragState={dragState} setDragState={setDragState}
                      isExpanded={expanded.has(s.id)}
                      onToggleExpand={() => toggleExpand(s.id)}
                    />
                  ))}
                </div>
                <button className="slot-add-row" onClick={addSlot}>+ Add layer</button>

                <div className="section-h">Diagram <span className="num">04</span></div>
                <div className="dd-wide">
                  <div className="dd-icon">↑</div>
                  <div className="dd-h">Drop a section drawing or detail PDF</div>
                  <div className="dd-s">SVG / PDF / PNG · referenced in schedule rows</div>
                </div>

                <div className="section-h">Notes &amp; Tags <span className="num">05</span></div>
                <div style={{ marginBottom:10 }}>
                  <label className="lbl-d">Tags</label>
                  <TagInput tags={tagsAsm} setTags={setTagsAsm} />
                </div>
                <div>
                  <label className="lbl-d">Assembly notes</label>
                  <textarea className="tarea-d" rows={3} placeholder="Specifier notes, restrictions, callouts, sequencing…" value={asmNotes} onChange={e => setAsmNotes(e.target.value)}></textarea>
                </div>
              </div>

              <aside className="asm-side">
                <div className="asm-codecard">
                  <div className="lbl">Assembly code</div>
                  {isEdit ? (
                    <div className="code">{code}</div>
                  ) : (
                    <input className="code-edit" value={code} onChange={e => setCode(e.target.value.toUpperCase())} />
                  )}
                  <div className="layers">— {slots.length} layer{slots.length===1?'':'s'} —</div>
                </div>

                <div className="asm-stack">
                  <div className="asm-stack-h"><span>Stack</span><span>top → finish</span></div>
                  <div className="asm-stack-bars">
                    {slots.length === 0 && <div className="asm-stack-empty">— no layers —</div>}
                    {slots.map((s, i) => {
                      const prod = s.productId ? allProducts.find(p => p.id === s.productId) : null;
                      const c = prod ? prod.color : s.color;
                      return (
                        <div key={s.id} className="asm-stack-bar">
                          <div className="swatch" style={{ background: c }}></div>
                          <span className="idx">{String(i+1).padStart(2,'0')}</span>
                          <span className="name">{s.name || <em style={{ color:'var(--ink-4)' }}>untitled</em>}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {derivedTrades.length > 0 && (
                  <div className="asm-trades">
                    <div className="asm-trades-h">Trades involved</div>
                    {derivedTrades.map(t => <span key={t} className="asm-trade-chip">{t}</span>)}
                  </div>
                )}

                <div className="slot-meta-bar" style={{ flexDirection:'column', gap:4, alignItems:'flex-start', marginTop:14 }}>
                  <div><b>{boundCount}</b>/{slots.length} bound to items</div>
                  {acoustic && <div><b>{acoustic}</b> acoustic</div>}
                  {fire && <div>FRL <b>{fire}</b></div>}
                  {thickness && <div><b>{thickness}</b> total</div>}
                </div>
              </aside>
            </div>
          ) : (
            <>
          <div className="section-h">Basics <span className="num">01</span></div>
          {isEdit && (
            <div style={{ marginBottom:10 }}>
              <label className="lbl-d">Code</label>
              <input className="inp-d mono" value={editItem.code} readOnly style={{ color:'var(--accent-ink)', fontStyle:'italic', fontFamily:'var(--font-serif)', fontSize:15 }} />
            </div>
          )}
          <div style={{ marginBottom:10 }}>
            <label className="lbl-d">Name<span className="req-d">*</span></label>
            <input className="inp-d" placeholder="e.g. Yokato Wall Sink Mixer" value={name} onChange={e => setName(e.target.value)} autoFocus />
          </div>
          <div className="row-2">
            <div><label className="lbl-d">Brand</label><input className="inp-d" placeholder="e.g. Brodware" value={brand} onChange={e => setBrand(e.target.value)} /></div>
            <div><label className="lbl-d">Supplier</label><input className="inp-d" placeholder="e.g. Brodware Sydney" value={supplier} onChange={e => setSupplier(e.target.value)} /></div>
          </div>

          <div className="section-h">Category <span className="num">02</span></div>
          <div className="row-3">
            <div><label className="lbl-d">Type<span className="req-d">*</span></label>
              <select className="sel-d" value={type} onChange={e => setType(e.target.value)}><option>Tapware</option><option>Flooring</option><option>Paint</option><option>Tile</option><option>Masonry</option></select>
            </div>
            <div><label className="lbl-d">Subtype</label>
              <input className="inp-d" value={subtype} onChange={e => setSubtype(e.target.value)} placeholder="e.g. Wall mixer" />
            </div>
            <div><label className="lbl-d">Trade</label>
              <select className="sel-d" value={trade} onChange={e => setTrade(e.target.value)}><option>Plumbing</option><option>Carpentry</option><option>Painter</option><option>Tiling</option><option>Bricklaying</option></select>
            </div>
          </div>

          <div className="section-h">Commerce <span className="num">03</span></div>
          <div className="row-3">
            <div><label className="lbl-d">SKU</label><input className="inp-d mono" placeholder="BWY-SK-BB" value={sku} onChange={e => setSku(e.target.value)} /></div>
            <div><label className="lbl-d">Price</label><input className="inp-d mono" placeholder="$1,240.00" value={price} onChange={e => setPrice(e.target.value)} /></div>
            <div><label className="lbl-d">Unit</label>
              <select className="sel-d" value={unit} onChange={e => setUnit(e.target.value)}><option>ea</option><option>m²</option><option>m</option><option>L</option><option>kg</option></select>
            </div>
          </div>

          <div className="section-h">Visual <span className="num">04</span></div>
          <SwatchPicker value={color} setValue={setColor} />

          <div className="section-h">Files <span className="num">05</span></div>
          <div className="row-2">
            <div><label className="lbl-d">Image</label><div className="dd"><div className="dd-icon">↑</div><div className="dd-h">Drop image</div><div className="dd-s">PNG / JPG</div></div></div>
            <div><label className="lbl-d">Datasheet</label><div className="dd"><div className="dd-icon">↑</div><div className="dd-h">Drop PDF</div><div className="dd-s">Spec sheet</div></div></div>
          </div>

          <div className="section-h">Notes &amp; Tags <span className="num">06</span></div>
          <div style={{ marginBottom:10 }}>
            <label className="lbl-d">Tags</label>
            <TagInput tags={tags} setTags={setTags} />
          </div>
          <div style={{ marginBottom:10 }}>
            <label className="lbl-d">Supplier URL</label>
            <input className="inp-d" placeholder="https://" />
          </div>
              <div>
                <label className="lbl-d">Notes</label>
            <textarea className="tarea-d" rows={3} placeholder="Lead time, finish notes, alternative SKUs…"></textarea>
          </div>
            </>
          )}
        </div>
        <div className="drw-foot">
          <button className="btn-sec-d" onClick={onClose}>Cancel</button>
          {!isEdit && <button className="btn-sec-d">Save &amp; add another</button>}
          <span style={{ flex:1 }}></span>
          <button className="btn-pri-d" onClick={submit}>{isEdit ? 'Save changes' : (isTypeMode ? 'Save Assembly' : 'Save Product')}</button>
        </div>
      </div>
    </>
  );
}

/* ── APP ── */
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "q6thumb": "strip",
    "layout": "A",
    "codeStyle": "mono",
    "swatchStyle": "flat",
    "emptyStyle": "ghost",
    "headerStyle": "inline"
  }/*EDITMODE-END*/;

  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { TweaksPanel, TweakSection, TweakRadio, TweakSelect } = window;

  const [libraries, setLibraries] = useState(LIBRARIES);
  const [activeLibId, setActiveLibId] = useState(LIBRARIES[0].id);  const [libModal, setLibModal] = useState(null); // null | { mode:'add'|'edit', lib? }
  const [libDeleteTarget, setLibDeleteTarget] = useState(null);
  const activeLib = libraries.find(l => l.id === activeLibId) || libraries[0];

  const onLibSave = ({ id, name, description }) => {
    if (id) {
      setLibraries(prev => prev.map(l => l.id === id ? { ...l, name, description } : l));
    } else {
      const newLib = { id: 'lib_' + Math.random().toString(36).slice(2,8), name, description, itemCount: 0, typeCount: 0, created: new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0') };
      setLibraries(prev => [...prev, newLib]);
      setActiveLibId(newLib.id);
    }
  };
  const onLibDelete = id => {
    const remaining = libraries.filter(l => l.id !== id);
    setLibraries(remaining);
    if (activeLibId === id) setActiveLibId(remaining[0]?.id);
  };

  const [tab, setTab] = useState('products');
  const [layout, setLayout] = useState('A');
  const [products, setProducts] = useState(PRODUCTS);
  const [types, setTypes] = useState(TYPES);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [searchQ, setSearchQ] = useState('');
  const [filterType, setFilterType] = useState('All types');
  const [filterTemplate, setFilterTemplate] = useState('All templates');
  const [sortBy, setSortBy] = useState('name-asc');
  const [groupByType, setGroupByType] = useState(true);
  const [addOpen, setAddOpen] = useState(false);
  const [addMode, setAddMode] = useState('product');
  const [editItem, setEditItem] = useState(null);
  const [colsOpen, setColsOpen] = useState(false);
  const [productCols, setProductCols] = useState(() => new Set(PRODUCT_COLS.filter(c => c.defaultOn).map(c => c.id)));
  const [typeCols, setTypeCols] = useState(() => new Set(TYPE_COLS.filter(c => c.defaultOn).map(c => c.id)));
  const colsBtnRef = React.useRef(null);

  // Close popover on outside click
  React.useEffect(() => {
    if (!colsOpen) return;
    const onDoc = (e) => {
      if (colsBtnRef.current && !colsBtnRef.current.contains(e.target)) setColsOpen(false);
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [colsOpen]);

  const activeCols = tab === 'types' ? typeCols : productCols;
  const setActiveCols = tab === 'types' ? setTypeCols : setProductCols;
  const COL_DEFS = tab === 'types' ? TYPE_COLS : PRODUCT_COLS;
  const toggleCol = (id) => {
    setActiveCols(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const resetCols = () => setActiveCols(new Set(COL_DEFS.filter(c => c.defaultOn).map(c => c.id)));
  const showAllCols = () => setActiveCols(new Set(COL_DEFS.map(c => c.id)));

  const nextProductCode = () => {
    const nums = products.map(p => parseInt((p.code||'P-000').split('-')[1], 10) || 0);
    const next = (Math.max(0, ...nums) + 1).toString().padStart(3, '0');
    return `P-${next}`;
  };

  const nextTypeCode = (template) => nextAsmCode(template, types.map(t => t.code));

  const onAddType = (data) => {
    if (data.id) {
      setTypes(prev => prev.map(t => t.id === data.id ? { ...t, ...data } : t));
      return;
    }
    const id = 't_' + Math.random().toString(36).slice(2, 8);
    const newT = {
      id,
      code: data.code || nextTypeCode(data.template || 'Wall type'),
      name: data.name || 'Untitled assembly',
      template: data.template || 'Wall type',
      element: data.element,
      slots: data.slots || (data.colors ? data.colors.length : 0),
      trades: data.trades || [],
      colors: data.colors || [],
      slotData: data.slotData || [],
      acoustic: data.acoustic || '',
      fire: data.fire || '',
      thickness: data.thickness || '',
      notes: data.notes || '',
      tags: data.tags || [],
    };
    setTypes(prev => [newT, ...prev]);
    setTab('types');
  };

  const onAddProduct = (data) => {
    if (data.id) {
      // edit
      setProducts(prev => prev.map(p => p.id === data.id ? { ...p, ...data } : p));
      return;
    }
    const id = 'p_' + Math.random().toString(36).slice(2, 8);
    const newP = {
      id,
      code: nextProductCode(),
      name: data.name || 'Untitled product',
      brand: data.brand || '',
      supplier: data.supplier || '',
      type: data.type || 'Tapware',
      subtype: data.subtype || '',
      sku: data.sku || '',
      price: data.price || '',
      unit: data.unit || 'ea',
      trade: data.trade || 'Plumbing',
      color: data.color,
      tags: data.tags || [],
    };
    setProducts(prev => [newP, ...prev]);
    setTab('products');
  };

  const items = tab === 'products' ? products : types;
  const setItems = tab === 'products' ? setProducts : setTypes;

  const filtered = useMemo(() => {
    let list = items;
    if (searchQ) list = list.filter(i => i.name.toLowerCase().includes(searchQ.toLowerCase()) || (i.brand||'').toLowerCase().includes(searchQ.toLowerCase()) || (i.code||'').toLowerCase().includes(searchQ.toLowerCase()));
    if (tab === 'products' && filterType !== 'All types') list = list.filter(i => i.type === filterType);
    if (tab === 'types' && filterTemplate !== 'All templates') list = list.filter(i => i.template === filterTemplate);
    // Sort
    const parsePrice = p => typeof p === 'string' ? parseFloat(p.replace(/[^0-9.]/g,'')) || 0 : (p||0);
    const cmp = {
      'name-asc':  (a,b) => (a.name||'').localeCompare(b.name||''),
      'name-desc': (a,b) => (b.name||'').localeCompare(a.name||''),
      'brand-asc': (a,b) => (a.brand||'').localeCompare(b.brand||'') || (a.name||'').localeCompare(b.name||''),
      'price-asc': (a,b) => parsePrice(a.price) - parsePrice(b.price),
      'price-desc':(a,b) => parsePrice(b.price) - parsePrice(a.price),
      'type-asc':  (a,b) => ((a.type||a.template||'')).localeCompare(b.type||b.template||'') || (a.name||'').localeCompare(b.name||''),
    }[sortBy] || ((a,b)=>0);
    list = [...list].sort(cmp);
    return list;
  }, [items, searchQ, filterType, filterTemplate, tab, sortBy]);

  const onToggleSelect = id => setSelectedIds(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const onSelectAll = () => setSelectedIds(new Set(filtered.map(i => i.id)));
  const onClearSel = () => setSelectedIds(new Set());
  const onDeleteSelected = () => { setItems(prev => prev.filter(i => !selectedIds.has(i.id))); setSelectedIds(new Set()); };
  const onDelete = id => setItems(prev => prev.filter(i => i.id !== id));

  return (
    <>
      <nav className="nav">
        <div className="nav-firm">
          <div className="nav-glyph"></div>
          <div className="nav-name">Hollis &amp; Arne — Studio Archive</div>
        </div>
        <div style={{ display:'flex', alignItems:'baseline', gap:28 }}>
          <div className="nav-tabs">
            <a href="Library.html" className="nav-tab active"><span className="num">I</span>Library</a>
            <button className="nav-tab"><span className="num">II</span>Projects</button>
            <button className="nav-tab"><span className="num">III</span>Cost Schedule</button>
            <a href="Schedule Cards.html" className="nav-tab"><span className="num">IV</span>Schedule</a>
          </div>
          <div className="vbar"></div>
          <button className="nav-gear">⚙ V</button>
        </div>
      </nav>

      <div className="page">
        {/* PAGE HEADER */}
        <div className="page-header">
          <div>
            {t.headerStyle === 'stack' && <div className="eyebrow">I · Library</div>}
            <LibrarySwitcher
              libraries={libraries}
              activeId={activeLibId}
              onSwitch={setActiveLibId}
              onAdd={() => setLibModal({ mode:'add' })}
              onEdit={lib => setLibModal({ mode:'edit', lib })}
              onDelete={lib => setLibDeleteTarget(lib)}
              variant={t.headerStyle}
              productCount={products.length}
              typeCount={types.length}
            />
            {t.headerStyle === 'stack' && (
              <div className="page-meta" style={{ marginTop:14 }}>
                <span className="meta-mono">{products.length} products</span>
                <span className="meta-mono">{types.length} assemblies</span>
                {activeLib.description && !activeLib.isAll && <span className="meta-mono" style={{ color:'var(--ink-4)', fontStyle:'italic', fontFamily:'var(--font-serif)', fontSize:11, textTransform:'none', letterSpacing:0 }}>{activeLib.description}</span>}
              </div>
            )}
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {/* Layout toggle */}
            <div style={{ display:'inline-flex', marginRight:8 }}>
            {[
              { id:'A', label:'Register', icon:(
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <rect x="1" y="2" width="12" height="1.5" rx="0.5" fill="currentColor"/>
                  <rect x="1" y="6" width="12" height="1.5" rx="0.5" fill="currentColor"/>
                  <rect x="1" y="10" width="12" height="1.5" rx="0.5" fill="currentColor"/>
                </svg>
              )},
              { id:'B', label:'Gallery', icon:(
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <rect x="1" y="1" width="5.5" height="5.5" rx="0.5" fill="currentColor"/>
                  <rect x="7.5" y="1" width="5.5" height="5.5" rx="0.5" fill="currentColor"/>
                  <rect x="1" y="7.5" width="5.5" height="5.5" rx="0.5" fill="currentColor"/>
                  <rect x="7.5" y="7.5" width="5.5" height="5.5" rx="0.5" fill="currentColor"/>
                </svg>
              )},
              { id:'C', label:'Detail', icon:(
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <rect x="1" y="1" width="4.5" height="12" rx="0.5" fill="currentColor" opacity="0.6"/>
                  <rect x="6.5" y="1" width="6.5" height="12" rx="0.5" fill="currentColor"/>
                </svg>
              )},
            ].map(({ id, label, icon }, i) => (
              <button key={id} onClick={() => setLayout(id)} title={label}
                style={{ background: layout===id ? 'var(--ink)' : 'transparent', color: layout===id ? 'var(--paper)' : 'var(--ink-4)', border:'1px solid var(--rule-2)', borderLeft: i===0 ? '1px solid var(--rule-2)' : 'none', padding:'5px 10px', cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'var(--font-sans)', fontSize:'9.5px', letterSpacing:'0.09em', textTransform:'uppercase', fontWeight:500, transition:'all 0.1s' }}>
                {icon}
                {label}
              </button>
            ))}
            </div>
            {tab === 'types'
              ? <button className="btn-add type" onClick={() => { setAddMode('type'); setAddOpen(true); }}>+ Add Assembly</button>
              : <button className="btn-add product" onClick={() => { setAddMode('product'); setAddOpen(true); }}>+ Add Item</button>
            }
          </div>
        </div>

        {/* TABS */}
        <div className="lib-tabs">
          <button className={`lib-tab${tab==='products'?' active p':''}`} onClick={() => { setTab('products'); setSelectedIds(new Set()); }}>
            Products <span className="ct">{products.length}</span>
          </button>
          <button className={`lib-tab${tab==='types'?' active t':''}`} onClick={() => { setTab('types'); setSelectedIds(new Set()); }}>
            Assemblies <span className="ct">{types.length}</span>
          </button>
        </div>

        {/* TOOLBAR */}
        <div className="toolbar">
          <div className="search">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{ color:'var(--ink-4)', flexShrink:0 }}>
              <circle cx="10.5" cy="10.5" r="6" stroke="currentColor" strokeWidth="1.5"/>
              <line x1="15.2" y1="15.2" x2="20" y2="20" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
            <input placeholder={tab==='products' ? 'Search products, brands, SKUs…' : 'Search assemblies, codes, templates…'}
              value={searchQ} onChange={e => setSearchQ(e.target.value)} />
            {searchQ && <button onClick={() => setSearchQ('')} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--ink-4)', fontSize:14, padding:'0 2px' }}>×</button>}
          </div>
          <div className="vbar"></div>
          <span className="tb-lbl">Filter</span>
          {tab === 'products'
            ? <select className="filter-sel" value={filterType} onChange={e => setFilterType(e.target.value)}>
                {PRODUCT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            : <select className="filter-sel" value={filterTemplate} onChange={e => setFilterTemplate(e.target.value)}>
                {TYPE_TEMPLATES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
          }
          <div className="vbar"></div>
          <span className="tb-lbl">Sort</span>
          <select className="filter-sel" value={sortBy} onChange={e => setSortBy(e.target.value)} title="Sort">
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="brand-asc">Brand A–Z</option>
            <option value="type-asc">Type / Template</option>
            <option value="price-asc">Price low → high</option>
            <option value="price-desc">Price high → low</option>
          </select>
          <button className={`btn-ghost${groupByType?' on':''}`} onClick={() => setGroupByType(g => !g)} style={groupByType ? { background:'var(--ink)', color:'var(--paper)', borderColor:'var(--ink)' } : {}}>{groupByType ? '✓ Grouped' : 'Group'}</button>
          {layout === 'A' && (
            <span ref={colsBtnRef} style={{ position:'relative' }}>
              <button className={`btn-ghost${colsOpen?' on':''}`} onClick={() => setColsOpen(o => !o)} style={colsOpen ? { background:'var(--ink)', color:'var(--paper)', borderColor:'var(--ink)' } : {}}>
                Columns <span style={{ fontFamily:'var(--font-mono)', fontSize:9, marginLeft:4, opacity:0.7 }}>{activeCols.size}/{COL_DEFS.length}</span>
              </button>
              {colsOpen && (
                <div className="col-popover">
                  <div className="col-popover-h">{tab === 'types' ? 'Assembly Columns' : 'Product Columns'}</div>
                  {COL_DEFS.map(c => {
                    const on = activeCols.has(c.id);
                    return (
                      <div key={c.id} className={`col-popover-row${c.locked?' locked':''}`} onClick={() => !c.locked && toggleCol(c.id)}>
                        <div className={`cb${on?' checked':''}`} style={c.locked ? { opacity:0.4 } : {}}>
                          {on && <svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2 4-4" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        </div>
                        <span>{c.label}</span>
                        {c.locked && <span className="lock-tag">Required</span>}
                      </div>
                    );
                  })}
                  <div className="col-popover-foot">
                    <button onClick={resetCols}>Reset</button>
                    <button onClick={showAllCols}>Show all</button>
                  </div>
                </div>
              )}
            </span>
          )}
          <span className="tb-grow"></span>
          <span className="tb-count">{filtered.length} of {items.length}</span>
        </div>

        {/* CONTENT */}
        {layout === 'A' && <LayoutA items={filtered} tab={tab} selectedIds={selectedIds} onToggleSelect={onToggleSelect} onDelete={onDelete} q6thumb={t.q6thumb} groupByType={groupByType} onSelectAllVisible={onSelectAll} onClearSel={onClearSel} onEditItem={tab==='products' ? setEditItem : null} codeStyle={t.codeStyle} visibleColIds={activeCols} onAddNew={() => { setAddMode(tab === 'types' ? 'type' : 'product'); setAddOpen(true); }} />}
        {layout === 'B' && <LayoutB items={filtered} tab={tab} selectedIds={selectedIds} onToggleSelect={onToggleSelect} q6thumb={t.q6thumb} groupByType={groupByType} onEditItem={tab==='products' ? setEditItem : null} onDelete={onDelete} codeStyle={t.codeStyle} swatchStyle={t.swatchStyle} onAddNew={() => setAddOpen(true)} emptyStyle={t.emptyStyle} />}
        {layout === 'C' && <LayoutC items={filtered} tab={tab} selectedIds={selectedIds} onToggleSelect={onToggleSelect} onDelete={onDelete} q6thumb={t.q6thumb} groupByType={groupByType} codeStyle={t.codeStyle} onAddNew={() => { setAddMode(tab === 'types' ? 'type' : 'product'); setAddOpen(true); }} />}
      </div>

      {/* LIBRARY MODALS */}
      {libModal && (
        <LibraryModal
          lib={libModal.mode === 'edit' ? libModal.lib : null}
          onClose={() => setLibModal(null)}
          onSave={onLibSave}
        />
      )}
      {libDeleteTarget && (
        <LibraryDeleteModal
          lib={libDeleteTarget}
          onClose={() => setLibDeleteTarget(null)}
          onConfirm={onLibDelete}
        />
      )}

      {/* ADD/EDIT PRODUCT DRAWER */}
      {addOpen && <AddProductDrawer onClose={() => setAddOpen(false)} onSave={addMode === 'type' ? onAddType : onAddProduct} mode={addMode} allProducts={products} allTypeCodes={types.map(t => t.code)} />}
      {editItem && <AddProductDrawer onClose={() => setEditItem(null)} onSave={editItem.template ? onAddType : onAddProduct} editItem={editItem} mode={editItem.template ? 'type' : 'product'} allProducts={products} allTypeCodes={types.map(t => t.code)} />}

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Page masthead" />
        <TweakRadio label="Style" value={t.headerStyle}
          options={[{value:'stack',label:'Stack'},{value:'inline',label:'Inline'},{value:'plate',label:'Plate'},{value:'rule',label:'Rule'}]}
          onChange={v => setTweak('headerStyle', v)} />
        <TweakSection label="Item code style" />
        <TweakRadio label="Style" value={t.codeStyle}
          options={[{value:'serif',label:'Serif'},{value:'mono',label:'Mono'},{value:'pill',label:'Pill'},{value:'box',label:'Box'},{value:'stamp',label:'Stamp'}]}
          onChange={v => setTweak('codeStyle', v)} />
        <TweakSection label="Product swatch (Layout B)" />
        <TweakRadio label="Style" value={t.swatchStyle}
          options={[{value:'flat',label:'Flat'},{value:'material',label:'Material'},{value:'watermark',label:'Watermark'},{value:'studio',label:'Studio'}]}
          onChange={v => setTweak('swatchStyle', v)} />
        <TweakSection label="Empty cells (Layout B)" />
        <TweakSelect label="Style" value={t.emptyStyle}
          options={[{value:'ghost',label:'Dotted'},{value:'plain',label:'Plain'},{value:'hatch',label:'Hatched'},{value:'dashed',label:'Dashed'},{value:'cta-span',label:'CTA span'},{value:'stretch',label:'Stretch fit'}]}
          onChange={v => setTweak('emptyStyle', v)} />
        <TweakSection label="Type thumbnail (Q6)" />
        <TweakRadio label="Style" value={t.q6thumb}
          options={[{value:'strip',label:'Strip'},{value:'serif',label:'Serif'},{value:'badge',label:'Badge'}]}
          onChange={v => setTweak('q6thumb', v)} />
      </TweaksPanel>

      {/* BULK ACTION BAR */}
      {selectedIds.size > 0 && (
        <div className="bulk-bar">
          <span className="bulk-count">{selectedIds.size} selected</span>
          <button className="bulk-act">Add to project</button>
          <button className="bulk-act">Tag</button>
          <button className="bulk-act">Export CSV</button>
          <button className="bulk-act danger" onClick={onDeleteSelected}>Delete</button>
          <button className="bulk-clear" onClick={onClearSel}>Clear ×</button>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
